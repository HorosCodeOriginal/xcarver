name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile C scanner
        run: gcc -O3 -march=x86-64 -shared -fPIC -pthread -o scanner.so scanner.c

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name xcarver \
            --add-binary "scanner.so:." \
            --add-data "scanner.c:." \
            --add-data "signatures.py:." \
            --add-data "fs_parser.py:." \
            carver.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xcarver-linux-x86_64
          path: dist/xcarver

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up MinGW
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64

      - name: Compile C scanner
        run: gcc -O3 -shared -o scanner.dll scanner.c

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller `
            --onefile `
            --name xcarver `
            --add-binary "scanner.dll;." `
            --add-data "scanner.c;." `
            carver.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xcarver-windows-x86_64
          path: dist/xcarver.exe

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: xcarver-linux-x86_64
          path: ./artifacts/linux/

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: xcarver-windows-x86_64
          path: ./artifacts/windows/

      - name: Rename artifacts
        run: |
          mv artifacts/linux/xcarver artifacts/xcarver-linux-x86_64
          mv artifacts/windows/xcarver.exe artifacts/xcarver-windows-x86_64.exe
          chmod +x artifacts/xcarver-linux-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/xcarver-linux-x86_64
            artifacts/xcarver-windows-x86_64.exe
          generate_release_notes: true
          body: |
            ## xCarver ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Linux x86_64 | `xcarver-linux-x86_64` |
            | Windows x86_64 | `xcarver-windows-x86_64.exe` |

            ### Quick start
            ```bash
            # Linux
            chmod +x xcarver-linux-x86_64
            sudo ./xcarver-linux-x86_64 /dev/sdb --output ./recovered/

            # Or run from source (auto-compiles C scanner)
            python3 carver.py --help
            ```
